name: Test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Only versions covered by Go's security backport policy
        # (the two most recent majors). Older versions are EOL — their
        # stdlib CVEs no longer receive fixes, so govulncheck cannot
        # go green on them. Bump as new majors release.
        go-version: ['1.25', '1.26']
    steps:
      - name: Checkout sdk-go
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          path: sdk-go

      - name: Checkout integration-test-data
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          ref: main

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: sdk-go/go.sum

      - name: Vet
        working-directory: sdk-go
        run: go vet ./...

      - name: Test
        working-directory: sdk-go
        run: go test -race -short ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9  # v8.0.0
        with:
          working-directory: sdk-go

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        working-directory: sdk-go
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: sdk-go
        run: govulncheck ./...
